<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🛒 Lista della Spesa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e0dbd3;
    --text: #1a1714;
    --text2: #6b6560;
    --accent: #2d6a4f;
    --accent-light: #e8f4ef;
    --accent2: #e76f51;
    --done-bg: #f0f0f0;
    --done-text: #aaa;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: 0 0 120px 0;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }

  header h1 {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  header p {
    font-size: 0.78rem;
    opacity: 0.75;
    margin-top: 3px;
    font-weight: 300;
  }

  .input-area {
    padding: 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    background: white;
  }

  input[type="text"]::placeholder { color: var(--text2); }

  .btn-add {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-add:active { transform: scale(0.93); background: #1e4d38; }

  .actions {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:active { transform: scale(0.96); }

  .btn-sort {
    background: var(--accent);
    color: white;
    flex: 1;
    justify-content: center;
    padding: 13px 16px;
    font-size: 0.95rem;
    border-radius: 12px;
  }

  .btn-clear {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-uncheck {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .loading {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px;
    color: var(--accent);
    font-size: 0.9rem;
    font-weight: 500;
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2.5px solid var(--accent-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .list-container { padding: 8px 16px; }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text2);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.5; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    padding: 16px 4px 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .item {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: opacity 0.2s, background 0.2s;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .item.done {
    background: var(--done-bg);
    border-color: transparent;
    box-shadow: none;
  }

  .item.done .item-name {
    text-decoration: line-through;
    color: var(--done-text);
  }

  .item.done .item-reparto { opacity: 0.4; }

  .checkbox {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    background: white;
  }

  .item.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .item-content { flex: 1; min-width: 0; }

  .item-name {
    font-size: 1rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s;
  }

  .item-reparto {
    font-size: 0.75rem;
    color: var(--text2);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--border);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  .btn-delete:active { color: #e74c3c; background: #fdecea; }

  .counter {
    font-size: 0.75rem;
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: auto;
  }

  .error-msg {
    background: #fdecea;
    color: #c0392b;
    padding: 12px 16px;
    margin: 8px 16px;
    border-radius: 10px;
    font-size: 0.85rem;
    display: none;
  }

  .error-msg.visible { display: block; }

  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.2);
    margin-top: 8px;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: white;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<header>
  <h1>🛒 Lista della Spesa <span class="counter" id="counter"></span></h1>
  <p id="subtitle">Aggiungi prodotti, poi ordina per percorso supermercato</p>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</header>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="itemInput" placeholder="Es: latte, petto di pollo, pasta…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn-add" onclick="addItem()" aria-label="Aggiungi">+</button>
  </div>
</div>

<div class="actions">
  <button class="btn btn-sort" onclick="sortWithAI()" id="sortBtn">✨ Ordina per supermercato</button>
  <button class="btn btn-uncheck" onclick="uncheckAll()">↺ Reset spunte</button>
  <button class="btn btn-clear" onclick="clearAll()">🗑 Svuota</button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  Sto ordinando per percorso…
</div>

<div class="error-msg" id="errorMsg"></div>

<div class="list-container" id="listContainer">
  <div class="empty-state">
    <div class="icon">🧺</div>
    <p>Nessun prodotto ancora.<br>Aggiungi qualcosa sopra!</p>
  </div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('spesa_items') || '[]');
// items = [{name, reparto, repartoEmoji, done, id}]

function save() {
  localStorage.setItem('spesa_items', JSON.stringify(items));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function updateCounter() {
  const total = items.length;
  const done = items.filter(i => i.done).length;
  const el = document.getElementById('counter');
  const sub = document.getElementById('subtitle');
  const fill = document.getElementById('progressFill');
  if (total === 0) {
    el.textContent = '';
    sub.textContent = 'Aggiungi prodotti, poi ordina per percorso supermercato';
    fill.style.width = '0%';
  } else {
    el.textContent = `${done}/${total}`;
    sub.textContent = done === total ? '✅ Spesa completata!' : `${total - done} prodotti rimasti`;
    fill.style.width = `${(done/total)*100}%`;
  }
}

function render() {
  const container = document.getElementById('listContainer');
  updateCounter();

  if (items.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🧺</div><p>Nessun prodotto ancora.<br>Aggiungi qualcosa sopra!</p></div>`;
    return;
  }

  // raggruppa per reparto se ordinato, altrimenti lista piatta
  const hasReparti = items.some(i => i.reparto);

  let html = '';
  if (hasReparti) {
    const groups = {};
    items.forEach(item => {
      const key = item.reparto || 'Altro';
      if (!groups[key]) groups[key] = { emoji: item.repartoEmoji || '🛒', items: [] };
      groups[key].items.push(item);
    });
    Object.entries(groups).forEach(([reparto, data]) => {
      html += `<div class="section-label">${data.emoji} ${reparto}</div>`;
      data.items.forEach(item => { html += renderItem(item); });
    });
  } else {
    items.forEach(item => { html += renderItem(item); });
  }

  container.innerHTML = html;
}

function renderItem(item) {
  const doneClass = item.done ? 'done' : '';
  const check = item.done ? '✓' : '';
  const repartoHtml = item.reparto
    ? `<div class="item-reparto">${item.repartoEmoji || ''} ${item.reparto}</div>`
    : '';
  return `
    <div class="item ${doneClass}" onclick="toggleDone('${item.id}')">
      <div class="checkbox">${check}</div>
      <div class="item-content">
        <div class="item-name">${escHtml(item.name)}</div>
        ${repartoHtml}
      </div>
      <button class="btn-delete" onclick="event.stopPropagation(); deleteItem('${item.id}')" aria-label="Elimina">×</button>
    </div>`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addItem() {
  const input = document.getElementById('itemInput');
  const name = input.value.trim();
  if (!name) return;

  // supporta più prodotti separati da virgola
  const names = name.split(',').map(s => s.trim()).filter(Boolean);
  names.forEach(n => {
    items.push({ id: uid(), name: n, reparto: null, repartoEmoji: null, done: false });
  });
  save();
  render();
  input.value = '';
  input.focus();
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  save();
  render();
}

function toggleDone(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.done = !item.done; save(); render(); }
}

function uncheckAll() {
  items.forEach(i => i.done = false);
  save();
  render();
}

function clearAll() {
  if (items.length === 0) return;
  if (!confirm('Svuotare tutta la lista?')) return;
  items = [];
  save();
  render();
}

async function sortWithAI() {
  const pending = items.filter(i => !i.done);
  if (pending.length === 0) return;

  const btn = document.getElementById('sortBtn');
  const loading = document.getElementById('loading');
  const errEl = document.getElementById('errorMsg');

  btn.disabled = true;
  btn.textContent = '⏳ Ordinando…';
  loading.classList.add('visible');
  errEl.classList.remove('visible');

  const productList = pending.map(i => i.name).join(', ');

  const prompt = `Sei un esperto di layout supermercati italiani. Ti do una lista della spesa e devi ordinarla secondo il percorso fisico tipico di un supermercato italiano (come Esselunga, Conad, Carrefour, Coop).

Il percorso standard è:
1. Ortofrutta (frutta, verdura, erbe)
2. Pane e Panetteria (pane, grissini, friselle)
3. Pesce (pesce fresco, molluschi)
4. Macelleria / Gastronomia (carne, affettati al banco, pollo)
5. Latticini e Uova (latte, yogurt, formaggi confezionati, uova, burro)
6. Salumi e Formaggi (affettati confezionati, formaggi sottovuoto)
7. Surgelati (verdure surgelate, pesce surgelato, piatti pronti)
8. Dispensa / Conserve (passata, tonno, legumi in scatola, sottaceti)
9. Pasta e Riso (pasta, riso, cereali, farine)
10. Condimenti e Olio (olio, aceto, sale, spezie, salse)
11. Colazione e Dolci (biscotti, cereali, merendine, cioccolato, zucchero)
12. Bevande (acqua, succhi, bibite, vino, birra)
13. Igiene e Cura persona (shampoo, dentifricio, deodorante)
14. Prodotti per la casa / Detersivi (detersivo piatti, lavatrice, pulizia casa)
15. Farmacia / Para (integratori, cerotti, prodotti farmaceutici)

Lista prodotti da ordinare: ${productList}

Rispondi SOLO con un array JSON. Nessun testo prima o dopo. Formato:
[
  {"name": "nome prodotto esatto come l'ho scritto", "reparto": "nome reparto", "emoji": "emoji reparto"},
  ...
]

Usa i nomi esatti come li ho scritti io. Per "reparto" usa uno dei nomi standard elencati sopra (es. "Ortofrutta", "Latticini e Uova", ecc.). Per prodotti senza glutine, assegnali al reparto corretto in base al tipo di prodotto. Includi TUTTI i prodotti della lista.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '';

    // parse JSON pulito
    const jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) throw new Error('Risposta non valida');
    const sorted = JSON.parse(jsonMatch[0]);

    // mappa emoji reparto
    const repartoEmoji = {
      'Ortofrutta': '🥦',
      'Pane e Panetteria': '🥖',
      'Pesce': '🐟',
      'Macelleria / Gastronomia': '🥩',
      'Latticini e Uova': '🥛',
      'Salumi e Formaggi': '🧀',
      'Surgelati': '🧊',
      'Dispensa / Conserve': '🥫',
      'Pasta e Riso': '🍝',
      'Condimenti e Olio': '🫒',
      'Colazione e Dolci': '🍪',
      'Bevande': '💧',
      'Igiene e Cura persona': '🧴',
      'Prodotti per la casa / Detersivi': '🧹',
      'Farmacia / Para': '💊',
    };

    // ricostruisce items: prima i sorted (ordinati), poi i done
    const doneItems = items.filter(i => i.done);
    const newPending = sorted.map(s => {
      const orig = pending.find(p => p.name.toLowerCase() === s.name.toLowerCase())
                || pending.find(p => p.name.toLowerCase().includes(s.name.toLowerCase()))
                || pending.find(p => s.name.toLowerCase().includes(p.name.toLowerCase()));
      if (orig) {
        return { ...orig, reparto: s.reparto, repartoEmoji: repartoEmoji[s.reparto] || '🛒' };
      }
      return null;
    }).filter(Boolean);

    // aggiungi pending non matchati in fondo
    const matchedIds = new Set(newPending.map(i => i.id));
    pending.filter(i => !matchedIds.has(i.id)).forEach(i => newPending.push(i));

    items = [...newPending, ...doneItems];
    save();
    render();

  } catch (err) {
    errEl.textContent = '⚠️ Errore nell\'ordinamento. Riprova tra poco.';
    errEl.classList.add('visible');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ Ordina per supermercato';
    loading.classList.remove('visible');
  }
}

// enter key
document.getElementById('itemInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

// init
render();
</script>
</body>
</html>
