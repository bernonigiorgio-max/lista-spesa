<title>🛒 Lista della Spesa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#f5f2ee;--surface:#fff;--surface2:#f0ede8;--border:#e0dbd3;--text:#1a1714;--text2:#6b6560;--accent:#2d6a4f;--shadow:0 2px 12px rgba(0,0,0,0.07);--radius:14px}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding:0 0 120px}
  header{background:var(--accent);color:white;padding:20px 20px 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,0.15)}
  header h1{font-size:1.25rem;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px}
  .header-sub{font-size:.78rem;opacity:.75;margin-top:3px;font-weight:300;display:flex;justify-content:space-between;align-items:center}
  .counter-badge{background:rgba(255,255,255,0.2);padding:2px 9px;border-radius:20px;font-size:.78rem;font-weight:500}
  .progress-bar{height:3px;background:rgba(255,255,255,0.2);margin-top:10px;border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:white;border-radius:2px;transition:width .4s ease}
  .sync-bar{background:rgba(0,0,0,0.15);padding:5px 20px;font-size:.72rem;display:flex;align-items:center;gap:6px;min-height:26px}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#7bed9f;flex-shrink:0}
  .sync-dot.syncing{background:#ffa502;animation:pulse 1s infinite}
  .sync-dot.error{background:#ff4757}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .input-area{padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
  .input-row{display:flex;gap:10px;align-items:center}
  input[type="text"]{flex:1;font-family:'DM Sans',sans-serif;font-size:1rem;padding:13px 16px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s}
  input[type="text"]:focus{border-color:var(--accent);background:white}
  input[type="text"]::placeholder{color:var(--text2)}
  .btn-add{width:48px;height:48px;border-radius:12px;background:var(--accent);color:white;border:none;font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s}
  .btn-add:active{transform:scale(.93);background:#1e4d38}
  .actions{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;padding:10px 14px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
  .btn:active{transform:scale(.96)}
  .btn-sort{background:var(--accent);color:white;flex:1;justify-content:center;padding:13px 16px;font-size:.95rem;border-radius:12px}
  .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
  .list-container{padding:6px 16px}
  .empty-state{text-align:center;padding:52px 24px;color:var(--text2)}
  .empty-state .icon{font-size:3rem;margin-bottom:12px}
  .empty-state p{font-size:.9rem;line-height:1.6}
  .section-label{font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);padding:16px 2px 7px;display:flex;align-items:center;gap:7px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .item{background:var(--surface);border-radius:var(--radius);margin-bottom:8px;display:flex;align-items:center;gap:12px;padding:13px 14px;box-shadow:var(--shadow);border:1px solid var(--border);transition:opacity .2s,background .2s;cursor:pointer;user-select:none;-webkit-user-select:none}
  .item.done{background:#f0f0f0;border-color:transparent;box-shadow:none;opacity:.6}
  .item.done .item-name{text-decoration:line-through;color:#aaa}
  .checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.75rem;transition:all .15s;background:white}
  .item.done .checkbox{background:var(--accent);border-color:var(--accent);color:white}
  .item-content{flex:1;min-width:0}
  .item-name{font-size:.98rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-reparto{font-size:.73rem;color:var(--text2);margin-top:2px}
  .btn-delete{background:none;border:none;color:#ccc;font-size:1.3rem;cursor:pointer;padding:4px 6px;border-radius:6px;line-height:1;transition:color .15s;flex-shrink:0}
  .btn-delete:active{color:#e74c3c}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#222;color:white;padding:11px 20px;border-radius:30px;font-size:.85rem;font-weight:500;transition:transform .3s ease;z-index:999;white-space:nowrap;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

function normalizza(str){
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/['''`]/g,' ').replace(/[-_]/g,' ').replace(/\s+/g,' ').trim();
}

function classificaProdotto(nome){
  const testo=normalizza(nome);
  let migliore=null,punteggio=-1;
  for(const rep of REPARTI){
    for(const kw of rep.keywords){
      const kwn=normalizza(kw);
      if(testo.includes(kwn)&&kwn.length>punteggio){punteggio=kwn.length;migliore=rep;}
    }
  }
  if(!migliore){
    for(const parola of testo.split(' ')){
      if(parola.length<3)continue;
      for(const rep of REPARTI){
        for(const kw of rep.keywords){
          const kwn=normalizza(kw);
          if((kwn.includes(parola)||parola.includes(kwn))&&kwn.length>punteggio){punteggio=kwn.length;migliore=rep;}
        }
      }
    }
  }
  return migliore||{ordine:99,emoji:'🛒',nome:'Altro'};
}

// ── GOOGLE APPS SCRIPT ───────────────────────────────────────────────────────
async function leggiSheet(){
  const r=await fetch(SCRIPT_URL);
  if(!r.ok)throw new Error(`read ${r.status}`);
  return await r.json();
}

async function scriviSheet(items){
  const r=await fetch(SCRIPT_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(items)
  });
  if(!r.ok)throw new Error(`write ${r.status}`);
}

// ── STATO ────────────────────────────────────────────────────────────────────
let items=[];
let saveTimer=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function setSyncStatus(s){
  const dot=document.getElementById('syncDot');
  const msg=document.getElementById('syncMsg');
  dot.className='sync-dot';
  if(s==='ok')     {msg.textContent='Lista sincronizzata con Google Sheets ✓';}
  if(s==='saving') {dot.classList.add('syncing');msg.textContent='Salvataggio in corso…';}
  if(s==='error')  {dot.classList.add('error');  msg.textContent='Errore connessione — riprova';}
  if(s==='loading'){dot.classList.add('syncing');msg.textContent='Caricamento lista…';}
}

function schedSave(){
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await scriviSheet(items);setSyncStatus('ok');}
    catch(e){setSyncStatus('error');toast('⚠️ Errore salvataggio');}
  },800);
}

function aggiornaHeader(){
  const total=items.length,done=items.filter(i=>i.done).length;
  document.getElementById('counter').textContent=total>0?`${done}/${total}`:'';
  document.getElementById('progressFill').style.width=total>0?`${(done/total)*100}%`:'0%';
  const sub=document.getElementById('subtitle');
  if(total===0)        sub.textContent='Aggiungi prodotti e ordina per percorso';
  else if(done===total)sub.textContent='✅ Spesa completata!';
  else                 sub.textContent=`${total-done} prodott${total-done===1?'o':'i'} rimanent${total-done===1?'e':'i'}`;
}

function renderLista(){
  aggiornaHeader();
  const c=document.getElementById('listContainer');
  if(items.length===0){
    c.innerHTML=`<div class="empty-state"><div class="icon">🧺</div><p>Nessun prodotto ancora.<br>Aggiungi qualcosa sopra!</p></div>`;
    return;
  }
  const hasR=items.some(i=>i.reparto);
  let html='';
  if(hasR){
    const g=new Map();
    for(const item of items){
      const k=item.reparto||'Altro';
      if(!g.has(k))g.set(k,{emoji:item.repartoEmoji||'🛒',items:[]});
      g.get(k).items.push(item);
    }
    for(const[rep,data]of g){
      html+=`<div class="section-label">${data.emoji} ${rep}</div>`;
      data.items.forEach(item=>{html+=renderItem(item);});
    }
  }else{items.forEach(item=>{html+=renderItem(item);});}
  c.innerHTML=html;
}

function renderItem(item){
  const dc=item.done?'done':'',ck=item.done?'✓':'';
  const rh=item.reparto?`<div class="item-reparto">${item.repartoEmoji} ${item.reparto}</div>`:'';
  return `<div class="item ${dc}" onclick="toggleDone('${item.id}')">
    <div class="checkbox">${ck}</div>
    <div class="item-content"><div class="item-name">${esc(item.name)}</div>${rh}</div>
    <button class="btn-delete" onclick="event.stopPropagation();eliminaItem('${item.id}')">×</button>
  </div>`;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ── AZIONI ───────────────────────────────────────────────────────────────────
function addItem(){
  const input=document.getElementById('itemInput');
  const val=input.value.trim();
  if(!val)return;
  val.split(',').map(s=>s.trim()).filter(Boolean).forEach(name=>{
    items.push({id:uid(),name,reparto:null,repartoEmoji:null,done:false});
  });
  renderLista();schedSave();
  input.value='';input.focus();
}

function eliminaItem(id){items=items.filter(i=>i.id!==id);renderLista();schedSave();}

function toggleDone(id){
  const item=items.find(i=>i.id===id);
  if(item){item.done=!item.done;renderLista();schedSave();}
}

function uncheckAll(){items.forEach(i=>i.done=false);renderLista();schedSave();toast('Spunte azzerate');}

function clearDone(){
  const n=items.filter(i=>i.done).length;
  if(n===0){toast('Nessun prodotto spuntato');return;}
  items=items.filter(i=>!i.done);renderLista();schedSave();toast(`Rimossi ${n} prodotti spuntati`);
}

function clearAll(){
  if(items.length===0)return;
  if(!confirm('Svuotare tutta la lista?'))return;
  items=[];renderLista();schedSave();
}

function sortItems(){
  const pending=items.filter(i=>!i.done);
  if(pending.length===0){toast('Nessun prodotto da ordinare');return;}
  const done=items.filter(i=>i.done);
  const classificati=pending.map(item=>{
    const rep=classificaProdotto(item.name);
    return{...item,reparto:rep.nome,repartoEmoji:rep.emoji,_ord:rep.ordine};
  }).sort((a,b)=>a._ord!==b._ord?a._ord-b._ord:a.name.localeCompare(b.name,'it'));
  items=[...classificati.map(({_ord,...r})=>r),...done];
  renderLista();schedSave();toast(`✓ Ordinati ${pending.length} prodotti per percorso`);
}

document.getElementById('itemInput').addEventListener('keydown',e=>{if(e.key==='Enter')addItem();});

(async()=>{
  setSyncStatus('loading');
  try{items=await leggiSheet();setSyncStatus('ok');}
  catch(e){setSyncStatus('error');toast('⚠️ Impossibile caricare — controlla connessione');items=[];}
  renderLista();
})();
</script>
