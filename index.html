<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🛒 Lista della Spesa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f2ee;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e0dbd3;
    --text: #1a1714;
    --text2: #6b6560;
    --accent: #2d6a4f;
    --accent-light: #e8f4ef;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding: 0 0 120px 0;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 20px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-sub {
    font-size: 0.78rem;
    opacity: 0.75;
    margin-top: 3px;
    font-weight: 300;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .counter-badge {
    background: rgba(255,255,255,0.2);
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.2);
    margin-top: 10px;
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: white;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .input-area {
    padding: 14px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input[type="text"] {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); background: white; }
  input[type="text"]::placeholder { color: var(--text2); }

  .btn-add {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-add:active { transform: scale(0.93); background: #1e4d38; }

  .actions {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:active { transform: scale(0.96); }

  .btn-sort {
    background: var(--accent);
    color: white;
    flex: 1;
    justify-content: center;
    padding: 13px 16px;
    font-size: 0.95rem;
    border-radius: 12px;
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .list-container { padding: 6px 16px; }

  .empty-state {
    text-align: center;
    padding: 52px 24px;
    color: var(--text2);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    padding: 16px 2px 7px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .item {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: opacity 0.2s, background 0.2s;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .item.done {
    background: #f0f0f0;
    border-color: transparent;
    box-shadow: none;
    opacity: 0.6;
  }

  .item.done .item-name {
    text-decoration: line-through;
    color: #aaa;
  }

  .checkbox {
    width: 24px; height: 24px;
    border-radius: 7px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 0.75rem;
    transition: all 0.15s;
    background: white;
  }

  .item.done .checkbox {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .item-content { flex: 1; min-width: 0; }

  .item-name {
    font-size: 0.98rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-reparto {
    font-size: 0.73rem;
    color: var(--text2);
    margin-top: 2px;
  }

  .btn-delete {
    background: none;
    border: none;
    color: #ccc;
    font-size: 1.3rem;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .btn-delete:active { color: #e74c3c; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #222;
    color: white;
    padding: 11px 20px;
    border-radius: 30px;
    font-size: 0.85rem;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<header>
  <h1>🛒 Lista della Spesa</h1>
  <div class="header-sub">
    <span id="subtitle">Aggiungi prodotti e ordina per percorso</span>
    <span class="counter-badge" id="counter"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</header>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="itemInput" placeholder="Es: latte, petto di pollo, pasta…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn-add" onclick="addItem()" aria-label="Aggiungi">+</button>

<div class="toast" id="toast"></div>

// ─────────────────────────────────────────────
// MOTORE DI MATCHING
// ─────────────────────────────────────────────

function normalizza(str) {
  return str
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // rimuove accenti
    .replace(/['''`]/g, ' ')   // apostrofi → spazio
    .replace(/[-_]/g, ' ')     // trattini → spazio
    .replace(/\s+/g, ' ')      // spazi multipli → uno
    .trim();
}

function classificaProdotto(nome) {
  const testo = normalizza(nome);
  const parole = testo.split(' ');

  let migliore = null;
  let punteggioBest = -1;

  for (const reparto of REPARTI) {
    for (const kw of reparto.keywords) {
      const kwNorm = normalizza(kw);
      // match esatto sulla stringa completa
      if (testo.includes(kwNorm)) {
        const punteggio = kwNorm.length; // keyword più lunga = match più specifico
        if (punteggio > punteggioBest) {
          punteggioBest = punteggio;
          migliore = reparto;
        }
      }
    }
  }

  // se non trovato, prova match per singole parole del prodotto
  if (!migliore) {
    for (const parola of parole) {
      if (parola.length < 3) continue;
      for (const reparto of REPARTI) {
        for (const kw of reparto.keywords) {
          const kwNorm = normalizza(kw);
          if (kwNorm.includes(parola) || parola.includes(kwNorm)) {
            const punteggio = kwNorm.length;
            if (punteggio > punteggioBest) {
              punteggioBest = punteggio;
              migliore = reparto;
            }
          }
        }
      }
    }
  }

  return migliore || { ordine: 99, emoji: '🛒', nome: 'Altro' };
}

// ─────────────────────────────────────────────
// STATO E STORAGE
// ─────────────────────────────────────────────

let items = [];

function carica() {
  try {
    items = JSON.parse(localStorage.getItem('spesa_v2') || '[]');
  } catch(e) { items = []; }
}

function salva() {
  localStorage.setItem('spesa_v2', JSON.stringify(items));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ─────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────

function aggiornaHeader() {
  const total = items.length;
  const done = items.filter(i => i.done).length;
  document.getElementById('counter').textContent = total > 0 ? `${done}/${total}` : '';
  document.getElementById('progressFill').style.width = total > 0 ? `${(done/total)*100}%` : '0%';
  const sub = document.getElementById('subtitle');
  if (total === 0) sub.textContent = 'Aggiungi prodotti e ordina per percorso';
  else if (done === total) sub.textContent = '✅ Spesa completata!';
  else sub.textContent = `${total - done} product${total - done === 1 ? 'o' : 'i'} rimast${total - done === 1 ? 'o' : 'i'}`;
}

function renderLista() {
  aggiornaHeader();
  const container = document.getElementById('listContainer');

  if (items.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🧺</div>
        <p>Nessun prodotto ancora.<br>Aggiungi qualcosa sopra e premi<br><strong>Ordina per supermercato</strong>!</p>
      </div>`;
    return;
  }

  const hasReparti = items.some(i => i.reparto);
  let html = '';

  if (hasReparti) {
    // raggruppa per reparto mantenendo ordine
    const gruppi = new Map();
    for (const item of items) {
      const key = item.reparto || 'Altro';
      if (!gruppi.has(key)) gruppi.set(key, { emoji: item.repartoEmoji || '🛒', items: [] });
      gruppi.get(key).items.push(item);
    }
    for (const [reparto, data] of gruppi) {
      html += `<div class="section-label">${data.emoji} ${reparto}</div>`;
      for (const item of data.items) html += renderItem(item);
    }
  } else {
    for (const item of items) html += renderItem(item);
  }

  container.innerHTML = html;
}

function renderItem(item) {
  const done = item.done ? 'done' : '';
  const check = item.done ? '✓' : '';
  const repartoHtml = item.reparto
    ? `<div class="item-reparto">${item.repartoEmoji} ${item.reparto}</div>` : '';
  return `
    <div class="item ${done}" onclick="toggleDone('${item.id}')">
      <div class="checkbox">${check}</div>
      <div class="item-content">
        <div class="item-name">${esc(item.name)}</div>
        ${repartoHtml}
      </div>
      <button class="btn-delete" onclick="event.stopPropagation();eliminaItem('${item.id}')" aria-label="Elimina">×</button>
    </div>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────
// AZIONI
// ─────────────────────────────────────────────

function addItem() {
  const input = document.getElementById('itemInput');
  const val = input.value.trim();
  if (!val) return;

  val.split(',').map(s => s.trim()).filter(Boolean).forEach(name => {
    items.push({ id: uid(), name, reparto: null, repartoEmoji: null, done: false });
  });

  salva();
  renderLista();
  input.value = '';
  input.focus();
}

function eliminaItem(id) {
  items = items.filter(i => i.id !== id);
  salva();
  renderLista();
}

function toggleDone(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.done = !item.done; salva(); renderLista(); }
}

function uncheckAll() {
  items.forEach(i => i.done = false);
  salva();
  renderLista();
  toast('Spunte azzerate');
}

function clearAll() {
  if (items.length === 0) return;
  if (!confirm('Svuotare tutta la lista?')) return;
  items = [];
  salva();
  renderLista();
}

function sortItems() {
  if (items.filter(i => !i.done).length === 0) {
    toast('Nessun prodotto da ordinare');
    return;
  }

  const pending = items.filter(i => !i.done);
  const done = items.filter(i => i.done);

  // classifica e ordina
  const classificati = pending.map(item => {
    const reparto = classificaProdotto(item.name);
    return { ...item, reparto: reparto.nome, repartoEmoji: reparto.emoji, _ordine: reparto.ordine };
  });

  classificati.sort((a, b) => {
    if (a._ordine !== b._ordine) return a._ordine - b._ordine;
    return a.name.localeCompare(b.name, 'it');
  });

  // rimuovi campo interno _ordine
  items = [...classificati.map(({ _ordine, ...rest }) => rest), ...done];
  salva();
  renderLista();
  toast(`✓ Ordinati ${pending.length} prodotti per percorso`);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// enter key
document.getElementById('itemInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

// init
carica();
renderLista();
</script>
